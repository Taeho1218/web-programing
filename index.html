<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수려 | 수어 학습 & 퀴즈</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="app">
      <section id="main-page" class="page active">
        <header class="top-header">
          <div class="container header-inner">
            <h1 class="brand">수려</h1>

            <form id="search-form" class="search-form">
              <input id="search-input" type="text" placeholder="수어 단어를 검색하세요..." />
              <button type="submit">검색</button>
            </form>
          </div>
        </header>

        <main class="container main-content">
          <div id="category-filters" class="category-filters"></div>
          <div id="sign-grid" class="sign-grid"></div>
        </main>

        <button id="start-quiz-btn" class="fab">시험 보기</button>
      </section>
    </div>

    <div id="video-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-head">
          <h3 id="modal-title">수어 영상</h3>
          <button id="close-modal-btn" class="close-btn">×</button>
        </div>
        <video id="learn-video" controls></video>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

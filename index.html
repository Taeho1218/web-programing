
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>손말잇기 | 수화 학습 & 퀴즈</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="main-page" class="page active">
        <header class="top-header">
          <div class="container header-inner">
            <h1 class="brand">손말잇기</h1>
            <form id="search-form" class="search-form">
              <input id="search-input" type="text" placeholder="수화 단어를 검색하세요..." />
              <button type="submit">검색</button>
            </form>
          </div>
        </header>

        <div class="keywords-wrap">
          <div id="popular-keywords" class="container keywords"></div>
        </div>

        <main class="container main-content">
          <h2>추천 수화</h2>
          <div id="sign-grid" class="sign-grid"></div>
        </main>

        <button id="start-quiz-btn" class="fab">시험 보기</button>
      </section>

      <section id="quiz-page" class="page">
        <header class="top-header">
          <div class="container header-inner quiz-header">
            <button id="back-main-btn" class="ghost-btn">돌아가기</button>
            <h1 class="brand">수화 테스트</h1>
            <div class="spacer"></div>
          </div>
        </header>

        <main class="container quiz-layout">
          <section class="quiz-top">
            <p id="question-meta" class="question-meta"></p>
            <h2 id="question-text" class="question-text"></h2>
            <div id="question-letter" class="question-letter"></div>
          </section>

          <section class="quiz-bottom">
            <div class="camera-header">
              <h3>실시간 카메라</h3>
              <button id="toggle-camera-btn" class="camera-btn">카메라 켜기</button>
            </div>

            <div class="camera-stage">
              <video id="camera-video" autoplay playsinline></video>
              <canvas id="overlay-canvas"></canvas>
              <div id="camera-status" class="camera-status">카메라를 켜주세요</div>
              <div id="detect-status" class="detect-status hidden">손 감지됨 ✓</div>
            </div>

            <div class="quiz-actions">
              <button id="hint-btn" class="secondary">힌트 보기</button>
              <button id="skip-btn" class="primary">넘어가기</button>
            </div>

            <div id="feedback-bar" class="feedback-bar hidden"></div>
          </section>
        </main>
      </section>
    </div>

    <div id="video-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-head">
          <h3 id="modal-title">수화 영상</h3>
          <button id="close-modal-btn" class="close-btn">×</button>
        </div>
        <video id="learn-video" controls>
          <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4" />
        </video>
      </div>
    </div>

    <div id="result-modal" class="modal hidden">
      <div class="modal-content result">
        <h2>테스트 완료!</h2>
        <p id="result-correct"></p>
        <p id="result-skip"></p>
        <p id="result-rate"></p>
        <div class="result-actions">
          <button id="restart-btn" class="primary">다시 시작</button>
          <button id="go-main-btn" class="secondary">메인으로</button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
